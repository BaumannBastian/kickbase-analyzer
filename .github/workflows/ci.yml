# ------------------------------------
# ci.yml
#
# Continuous Integration: installiert das Projekt und fuehrt
# Lint/Syntax-Check sowie Unit-Tests aus.
# ------------------------------------

name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install --upgrade pip && pip install -e .

      - name: Lint
        run: ./scripts/lint.sh

      - name: Run tests
        run: ./scripts/test.sh

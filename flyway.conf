# ------------------------------------
# flyway.conf
#
# Flyway-Konfiguration fuer lokale PostgreSQL-Migrationen.
# Liest DB-Parameter aus Umgebungsvariablen.
#
# Usage
# ------------------------------------
# - flyway -configFiles=flyway.conf migrate
# ------------------------------------

flyway.url=jdbc:postgresql://${env.PGHOST}:${env.PGPORT}/${env.PGDATABASE}
flyway.user=${env.PGUSER}
flyway.password=${env.PGPASSWORD}
flyway.locations=filesystem:sql
flyway.baselineOnMigrate=true
flyway.connectRetries=5
flyway.sqlMigrationPrefix=V
flyway.sqlMigrationSeparator=__
